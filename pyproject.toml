[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
    "features/kanalyze-2.0.0",
    "Custom_classifiers/*_unused",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["Classifiers"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
